<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pasarela de Pago | Alejandro García</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background-color: #f5f7fa;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.checkout-wrapper {
    width: 100%;
    max-width: 480px;
    background: #ffffff;
    padding: 45px;
    border-radius: 14px;
    box-shadow: 0 20px 45px rgba(0,0,0,0.08);
}

.header {
    text-align: center;
    margin-bottom: 25px;
}

.header h1 {
    font-size: 22px;
    margin: 0;
    font-weight: 600;
}

.header p {
    font-size: 14px;
    color: #666;
    margin-top: 6px;
}

.security-badge {
    text-align: center;
    font-size: 13px;
    color: #2e7d32;
    margin-bottom: 30px;
}

.beneficiary {
    background: #f1f4f8;
    padding: 12px;
    border-radius: 8px;
    font-size: 14px;
    margin-bottom: 25px;
}

.beneficiary strong {
    color: #000;
}

label {
    font-size: 14px;
    font-weight: 500;
}

input[type="number"] {
    width: 100%;
    padding: 14px;
    font-size: 17px;
    border-radius: 8px;
    border: 1px solid #ccc;
    margin-top: 8px;
    margin-bottom: 25px;
    box-sizing: border-box;
}

.pay-button {
    width: 100%;
    padding: 15px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
    background-color: #003087;
    color: white;
    cursor: pointer;
    transition: 0.3s ease;
    font-weight: 600;
}

.pay-button:hover {
    background-color: #001c5a;
}

.footer {
    text-align: center;
    font-size: 12px;
    color: #777;
    margin-top: 25px;
    line-height: 1.5;
}
</style>
</head>

<body>

<div class="checkout-wrapper">

    <div class="header">
        <h1>Pasarela de Pago Segura</h1>
        <p>Transacción protegida y cifrada</p>
    </div>

    <div class="security-badge">
        🔒 Conexión segura SSL · Procesado mediante PayPal
    </div>

    <div class="beneficiary">
        Beneficiario del pago:<br>
        <strong>Alejandro García</strong>
    </div>

    <form action="https://www.paypal.com/cgi-bin/webscr" method="post" target="_top">
        <input type="hidden" name="cmd" value="_xclick">
        <input type="hidden" name="business" value="alejandrogarcia12345678910e@gmail.com">
        <input type="hidden" name="item_name" value="Pago a Alejandro García">
        <input type="hidden" name="currency_code" value="EUR">

        <label>Importe a pagar (mínimo 1€)</label>
        <input 
            type="number" 
            name="amount" 
            min="1" 
            step="0.01" 
            required 
            placeholder="Introduce el importe en €">

        <button class="pay-button" type="submit">
            Proceder al Pago Seguro
        </button>
    </form>

    <div class="footer">
        Esta transacción se procesa de forma segura a través de la plataforma oficial de PayPal. <br>
        No almacenamos datos bancarios ni información financiera.
    </div>

</div>

</body>
</html>
