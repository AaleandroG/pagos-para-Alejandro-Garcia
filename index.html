<!DOCTYPE html>
<html>
<head>
    <title>Pago Seguro</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
            padding-top: 60px;
        }
        .container {
            background: white;
            padding: 40px;
            margin: auto;
            width: 400px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        h2 {
            margin-bottom: 20px;
        }
        input[type="number"] {
            width: 80%;
            padding: 10px;
            margin: 15px 0;
            font-size: 16px;
        }
        input[type="submit"] {
            background-color: #0070ba;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
        }
        input[type="submit"]:hover {
            background-color: #005c99;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Pago Seguro</h2>
    <p>Introduce el importe que deseas pagar (mínimo 1€)</p>

    <form action="https://www.paypal.com/cgi-bin/webscr" method="post" target="_top">
        <input type="hidden" name="cmd" value="_xclick">
        <input type="hidden" name="business" value="alejandrogarcia12345678910e@gmail.com">
        <input type="hidden" name="item_name" value="Pago personalizado">
        <input type="hidden" name="currency_code" value="EUR">
        
        <input type="number" name="amount" min="1" step="0.01" required placeholder="Importe en €">

        <br>
        <input type="submit" value="Pagar con PayPal">
    </form>
</div>

</body>
</html>
