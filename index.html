<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pago Seguro</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.checkout-card {
    background: #ffffff;
    width: 100%;
    max-width: 420px;
    padding: 40px;
    border-radius: 16px;
    box-shadow: 0 25px 50px rgba(0,0,0,0.2);
    text-align: center;
}

.logo {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 10px;
}

.secure-badge {
    font-size: 14px;
    color: #28a745;
    margin-bottom: 25px;
}

h2 {
    margin-bottom: 10px;
}

.description {
    font-size: 14px;
    color: #666;
    margin-bottom: 25px;
}

.amount-input {
    width: 100%;
    padding: 14px;
    font-size: 18px;
    border-radius: 8px;
    border: 1px solid #ccc;
    margin-bottom: 20px;
}

.pay-button {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
    background-color: #0070ba;
    color: white;
    cursor: pointer;
    transition: 0.3s ease;
}

.pay-button:hover {
    background-color: #005c99;
}

.footer-security {
    margin-top: 25px;
    font-size: 12px;
    color: #888;
}
</style>
</head>

<body>

<div class="checkout-card">

    <div class="logo">Pago Seguro</div>
    <div class="secure-badge">🔒 Conexión cifrada SSL · Procesado por PayPal</div>

    <h2>Finalizar Pago</h2>
    <div class="description">
        Introduce el importe que deseas pagar.  
        Mínimo permitido: 1€.
    </div>

    <form action="https://www.paypal.com/cgi-bin/webscr" method="post" target="_top">
        <input type="hidden" name="cmd" value="_xclick">
        <input type="hidden" name="business" value="alejandrogarcia12345678910e@gmail.com">
        <input type="hidden" name="item_name" value="Pago personalizado">
        <input type="hidden" name="currency_code" value="EUR">

        <input 
            class="amount-input"
            type="number" 
            name="amount" 
            min="1" 
            step="0.01" 
            required 
            placeholder="Importe en €">

        <button class="pay-button" type="submit">
            Pagar de forma segura
        </button>
    </form>

    <div class="footer-security">
        Todas las transacciones se realizan a través de la plataforma segura de PayPal.
        No almacenamos datos bancarios.
    </div>

</div>

</body>
</html>
